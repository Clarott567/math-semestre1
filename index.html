<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths 3ème - Révision interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a56db',
                        secondary: '#7c3aed',
                        success: '#059669',
                        warning: '#d97706',
                        danger: '#dc2626'
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; }
        .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .module-active { border-left: 4px solid #1a56db; background: #eff6ff; }
        .progress-bar { transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        .katex-display { margin: 0.5rem 0; }
        .svg-container svg { max-width: 100%; height: auto; }
        .feedback-correct { background: #d1fae5; border-color: #059669; }
        .feedback-wrong { background: #fee2e2; border-color: #dc2626; }
        .feedback-step { background: #fef3c7; border-color: #d97706; }
        .slide-in { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"].math-input {
            font-family: 'Times New Roman', serif;
            font-size: 1.1rem;
            padding: 0.25rem 0.5rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.375rem;
            width: 120px;
            transition: border-color 0.3s;
        }
        input[type="text"].math-input:focus {
            border-color: #1a56db;
            outline: none;
            box-shadow: 0 0 0 3px rgba(26,86,219,0.2);
        }
        input[type="text"].math-input.correct { border-color: #059669; background: #d1fae5; }
        input[type="text"].math-input.wrong { border-color: #dc2626; background: #fee2e2; }
        .btn-primary {
            background: #1a56db;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-primary:hover { background: #1e40af; transform: scale(1.02); }
        .btn-secondary {
            background: #e5e7eb;
            color: #1f2937;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-secondary:hover { background: #d1d5db; }
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { border-bottom: 3px solid #1a56db; color: #1a56db; font-weight: 600; }
    </style>
</head>
<body>
    <!-- App Container -->
    <div id="app" class="max-w-6xl mx-auto px-4 py-6">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">📐 Maths 3ème</h1>
                <p class="text-sm text-gray-500">Programme marocain - Révision interactive</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-sm text-gray-600" id="progressLabel">0%</span>
                <div class="w-32 h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div id="globalProgress" class="h-full bg-blue-600 rounded-full progress-bar" style="width:0%"></div>
                </div>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Sidebar - Modules -->
            <aside class="lg:col-span-1">
                <div class="glass-card rounded-xl shadow-md p-4 sticky top-4">
                    <h2 class="font-semibold text-gray-700 mb-3 text-sm uppercase tracking-wider">Modules</h2>
                    <nav id="moduleNav" class="space-y-1">
                        <!-- Generated by JS -->
                    </nav>
                    <div class="mt-4 pt-4 border-t border-gray-200">
                        <button id="resetBtn" class="text-sm text-gray-500 hover:text-red-600 transition-colors">
                            🔄 Réinitialiser progression
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="lg:col-span-3">
                <div id="contentArea" class="glass-card rounded-xl shadow-md p-6 slide-in">
                    <!-- Dynamic content rendered by JS -->
                </div>
            </main>
        </div>
    </div>

    <script>
        // ============================================================
        // DATA: 9 modules with lessons and exercises
        // ============================================================
        const MODULES = [
            {
                id: 1,
                title: "Développement et factorisation",
                short: "Dev & Facto",
                icon: "✏️",
                lessons: [
                    "Développement d'expressions",
                    "Identités remarquables",
                    "Factorisation avec facteur commun",
                    "Factorisation avec identités remarquables"
                ],
                exercises: [
                    { type: "practice", label: "Développer (x+3)²" },
                    { type: "real", label: "📐 Aire d'un terrain" }
                ]
            },
            {
                id: 2,
                title: "Puissances",
                short: "Puissances",
                icon: "🔢",
                lessons: [
                    "Définition et exposants négatifs",
                    "Règles de calcul",
                    "Puissances de 10",
                    "Écriture scientifique"
                ],
                exercises: [
                    { type: "practice", label: "Calculer 2⁵ × 2⁻³" },
                    { type: "real", label: "🌍 Distance Terre-Lune" }
                ]
            },
            {
                id: 3,
                title: "Racines carrées",
                short: "Racines",
                icon: "√",
                lessons: [
                    "Définition de √a",
                    "Résolution x² = a",
                    "Produit et quotient",
                    "Supprimer le radical"
                ],
                exercises: [
                    { type: "practice", label: "Simplifier √72" },
                    { type: "real", label: "📏 Longueur d'une diagonale" }
                ]
            },
            {
                id: 4,
                title: "Théorème de Thalès",
                short: "Thalès",
                icon: "📐",
                lessons: [
                    "Théorème direct",
                    "Configurations",
                    "Réciproque",
                    "Démontrer le parallélisme"
                ],
                exercises: [
                    { type: "practice", label: "Calculer une longueur" },
                    { type: "real", label: "🏛️ Hauteur de la Koutoubia" }
                ]
            },
            {
                id: 5,
                title: "Théorème de Pythagore",
                short: "Pythagore",
                icon: "📏",
                lessons: [
                    "Théorème direct",
                    "Calcul de longueurs",
                    "Réciproque",
                    "Vérifier un angle droit"
                ],
                exercises: [
                    { type: "practice", label: "Calculer l'hypoténuse" },
                    { type: "real", label: "🧱 Mur de maçon" }
                ]
            },
            {
                id: 6,
                title: "Ordre et opérations",
                short: "Ordre",
                icon: "⚖️",
                lessons: [
                    "Comparaison de réels",
                    "Ordre et addition",
                    "Ordre et multiplication",
                    "Encadrements"
                ],
                exercises: [
                    { type: "practice", label: "Comparer 3√5 et √41" },
                    { type: "real", label: "🛒 Budget d'achat" }
                ]
            },
            {
                id: 7,
                title: "Trigonométrie",
                short: "Trigo",
                icon: "📐",
                lessons: [
                    "Cosinus, sinus, tangente",
                    "Formules fondamentales",
                    "Angles complémentaires",
                    "Angles particuliers"
                ],
                exercises: [
                    { type: "practice", label: "Calculer sin 30°" },
                    { type: "real", label: "♿ Rampe d'accès" }
                ]
            },
            {
                id: 8,
                title: "Angles inscrits",
                short: "Angles",
                icon: "⭕",
                lessons: [
                    "Angle au centre",
                    "Angle inscrit",
                    "Angles interceptant le même arc",
                    "Relation angle au centre / inscrit"
                ],
                exercises: [
                    { type: "practice", label: "Identifier l'angle" },
                    { type: "real", label: "🎯 Tir à l'arc" }
                ]
            },
            {
                id: 9,
                title: "Triangles isométriques et semblables",
                short: "Triangles",
                icon: "△",
                lessons: [
                    "Définition isométriques",
                    "Cas d'isométrie (3 cas)",
                    "Définition semblables",
                    "Cas de similitude (3 cas)"
                ],
                exercises: [
                    { type: "practice", label: "Identifier les triangles" },
                    { type: "real", label: "🏗️ Pont en construction" }
                ]
            }
        ];

        // ============================================================
        // STATE
        // ============================================================
        let currentModuleId = 1;
        let currentTab = 'lesson'; // 'lesson' | 'exercise'
        let exerciseStates = {}; // track answers per module

        // ============================================================
        // RENDER FUNCTIONS
        // ============================================================

        function renderSidebar() {
            const nav = document.getElementById('moduleNav');
            nav.innerHTML = MODULES.map(m => `
                <button class="module-btn w-full text-left px-4 py-2.5 rounded-lg transition-all text-sm flex items-center gap-3 ${m.id === currentModuleId ? 'module-active font-semibold text-blue-700' : 'text-gray-600 hover:bg-gray-100'}"
                        data-module="${m.id}">
                    <span>${m.icon}</span>
                    <span>${m.short}</span>
                    <span class="ml-auto text-xs text-gray-400">${getProgress(m.id)}%</span>
                </button>
            `).join('');

            document.querySelectorAll('.module-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentModuleId = parseInt(btn.dataset.module);
                    currentTab = 'lesson';
                    renderAll();
                });
            });
        }

        function getProgress(moduleId) {
            // Simple progress based on exercise completion
            const state = exerciseStates[moduleId] || {};
            const total = MODULES.find(m => m.id === moduleId)?.exercises.length || 1;
            const done = Object.values(state).filter(v => v === true).length;
            return Math.round((done / total) * 100);
        }

        function updateGlobalProgress() {
            let total = 0, done = 0;
            MODULES.forEach(m => {
                const state = exerciseStates[m.id] || {};
                const exs = m.exercises.length || 1;
                total += exs;
                done += Object.values(state).filter(v => v === true).length;
            });
            const pct = Math.round((done / total) * 100);
            document.getElementById('globalProgress').style.width = pct + '%';
            document.getElementById('progressLabel').textContent = pct + '%';
        }

        function renderContent() {
            const module = MODULES.find(m => m.id === currentModuleId);
            if (!module) return;

            const area = document.getElementById('contentArea');
            
            // Tabs
            const tabsHtml = `
                <div class="flex gap-4 border-b border-gray-200 mb-6">
                    <button class="tab-btn pb-3 px-2 text-gray-600 ${currentTab === 'lesson' ? 'active' : ''}" data-tab="lesson">
                        📖 Fiche de cours
                    </button>
                    <button class="tab-btn pb-3 px-2 text-gray-600 ${currentTab === 'exercise' ? 'active' : ''}" data-tab="exercise">
                        🧩 Exercices
                    </button>
                </div>
            `;

            let bodyHtml = '';
            if (currentTab === 'lesson') {
                bodyHtml = renderLesson(module);
            } else {
                bodyHtml = renderExercises(module);
            }

            area.innerHTML = tabsHtml + bodyHtml;

            // Tab listeners
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentTab = btn.dataset.tab;
                    renderContent();
                });
            });

            // Re-run KaTeX
            if (window.renderMathInElement) {
                window.renderMathInElement(area, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '\\[', right: '\\]', display: true},
                        {left: '\\(', right: '\\)', display: false}
                    ]
                });
            }
            updateGlobalProgress();
        }

        function renderLesson(module) {
            const specificLesson = getLessonContent(module.id);
            return `
                <div class="space-y-6">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl">${module.icon}</span>
                        <h2 class="text-xl font-bold text-gray-800">${module.title}</h2>
                    </div>
                    <div class="prose max-w-none text-gray-700">
                        ${specificLesson}
                    </div>
                </div>
            `;
        }

        // ============================================================
        // LESSON CONTENT per module (rich HTML with LaTeX)
        // ============================================================
        function getLessonContent(moduleId) {
            const contents = {
                1: `
                    <h3 class="font-semibold text-lg mt-4">🔹 Développement</h3>
                    <p>Développer = transformer un produit en somme.</p>
                    <div class="bg-blue-50 p-4 rounded-lg my-3">
                        <p class="font-mono">k(a + b) = ka + kb</p>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Identités remarquables</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div class="bg-green-50 p-4 rounded-lg">
                            <p class="font-bold">Carré d'une somme</p>
                            <p class="font-mono">(a+b)² = a² + 2ab + b²</p>
                        </div>
                        <div class="bg-green-50 p-4 rounded-lg">
                            <p class="font-bold">Carré d'une différence</p>
                            <p class="font-mono">(a−b)² = a² − 2ab + b²</p>
                        </div>
                        <div class="bg-green-50 p-4 rounded-lg col-span-2">
                            <p class="font-bold">Différence de carrés</p>
                            <p class="font-mono">(a+b)(a−b) = a² − b²</p>
                        </div>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Factorisation</h3>
                    <p>Factoriser = transformer une somme en produit. On cherche le <strong>facteur commun</strong>.</p>
                    <div class="bg-blue-50 p-4 rounded-lg my-3">
                        <p class="font-mono">ka + kb = k(a+b)</p>
                    </div>
                `,
                2: `
                    <h3 class="font-semibold text-lg mt-4">🔹 Définition</h3>
                    <p>$$a^n = a \\times a \\times \\cdots \\times a$$ (n fois)</p>
                    <h3 class="font-semibold text-lg mt-4">🔹 Exposant négatif</h3>
                    <p>$$a^{-n} = \\frac{1}{a^n}$$</p>
                    <h3 class="font-semibold text-lg mt-4">🔹 Règles de calcul</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div class="bg-blue-50 p-4 rounded-lg">$$a^n \\times a^m = a^{n+m}$$</div>
                        <div class="bg-blue-50 p-4 rounded-lg">$$\\frac{a^n}{a^m} = a^{n-m}$$</div>
                        <div class="bg-blue-50 p-4 rounded-lg">$$(a^n)^m = a^{n \\times m}$$</div>
                        <div class="bg-blue-50 p-4 rounded-lg">$$a^n \\times b^n = (ab)^n$$</div>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Écriture scientifique</h3>
                    <p>$$a \\times 10^n$$ avec $$1 \\le a < 10$$</p>
                `,
                3: `
                    <h3 class="font-semibold text-lg mt-4">🔹 Définition</h3>
                    <p>$$\\sqrt{a}$$ est le nombre positif dont le carré est $$a$$.</p>
                    <div class="bg-blue-50 p-4 rounded-lg my-3">
                        <p>$$(\\sqrt{a})^2 = a$$ et $$\\sqrt{a^2} = a$$</p>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Résolution $$x^2 = a$$</h3>
                    <ul class="list-disc pl-6 space-y-1">
                        <li>Si $$a > 0$$ : $$x = \\sqrt{a}$$ ou $$x = -\\sqrt{a}$$</li>
                        <li>Si $$a = 0$$ : $$x = 0$$</li>
                        <li>Si $$a < 0$$ : pas de solution</li>
                    </ul>
                    <h3 class="font-semibold text-lg mt-4">🔹 Opérations</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div class="bg-green-50 p-4 rounded-lg">$$\\sqrt{a} \\times \\sqrt{b} = \\sqrt{ab}$$</div>
                        <div class="bg-green-50 p-4 rounded-lg">$$\\frac{\\sqrt{a}}{\\sqrt{b}} = \\sqrt{\\frac{a}{b}}$$</div>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Supprimer le radical au dénominateur</h3>
                    <p>Multiplier par le conjugué.</p>
                    <div class="bg-blue-50 p-4 rounded-lg">$$\\frac{1}{\\sqrt{a}} = \\frac{\\sqrt{a}}{a}$$</div>
                `,
                4: `
                    <h3 class="font-semibold text-lg mt-4">🔹 Théorème de Thalès (direct)</h3>
                    <p>Si (BC) ∥ (MN) dans une configuration de Thalès :</p>
                    <div class="bg-blue-50 p-4 rounded-lg my-3">
                        $$\\frac{AM}{AB} = \\frac{AN}{AC} = \\frac{MN}{BC}$$
                    </div>
                    <div class="flex justify-center my-4">
                        <svg width="200" height="150" viewBox="0 0 200 150">
                            <polygon points="20,130 100,10 180,130" fill="none" stroke="#1a56db" stroke-width="2"/>
                            <line x1="60" y1="85" x2="140" y2="85" stroke="#dc2626" stroke-width="2" stroke-dasharray="4"/>
                            <text x="30" y="145" font-size="12" fill="#1a56db">A</text>
                            <text x="95" y="5" font-size="12" fill="#1a56db">M</text>
                            <text x="175" y="145" font-size="12" fill="#1a56db">N</text>
                            <text x="55" y="80" font-size="12" fill="#dc2626">(BC) ∥ (MN)</text>
                        </svg>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Réciproque</h3>
                    <p>Si les points sont alignés dans le même ordre et que les rapports sont égaux, alors les droites sont parallèles.</p>
                `,
                5: `
                    <h3 class="font-semibold text-lg mt-4">🔹 Théorème de Pythagore (direct)</h3>
                    <p>Dans un triangle rectangle, le carré de l'hypoténuse est égal à la somme des carrés des deux autres côtés.</p>
                    <div class="bg-blue-50 p-4 rounded-lg my-3 text-center">
                        $$BC^2 = AB^2 + AC^2$$
                    </div>
                    <div class="flex justify-center my-4">
                        <svg width="150" height="130" viewBox="0 0 150 130">
                            <polygon points="10,110 110,110 10,20" fill="none" stroke="#1a56db" stroke-width="2"/>
                            <text x="5" y="130" font-size="12" fill="#1a56db">A</text>
                            <text x="105" y="130" font-size="12" fill="#1a56db">B</text>
                            <text x="0" y="15" font-size="12" fill="#1a56db">C</text>
                            <rect x="10" y="100" width="8" height="8" fill="#1a56db"/>
                            <rect x="10" y="20" width="8" height="8" fill="#1a56db"/>
                        </svg>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Réciproque</h3>
                    <p>Si $$BC^2 = AB^2 + AC^2$$ alors le triangle est rectangle en A.</p>
                    <p class="text-sm text-gray-500 mt-2">💡 Permet de vérifier qu'un angle est droit (ex: règle du 3-4-5).</p>
                `,
                6: `
                    <h3 class="font-semibold text-lg mt-4">🔹 Comparaison</h3>
                    <p>$$a - b < 0 \\iff a < b$$</p>
                    <h3 class="font-semibold text-lg mt-4">🔹 Ordre et opérations</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div class="bg-blue-50 p-4 rounded-lg">
                            <p><strong>Addition</strong></p>
                            <p>Si $$a < b$$ alors $$a+c < b+c$$</p>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-lg">
                            <p><strong>Multiplication par positif</strong></p>
                            <p>Si $$a < b$$ et $$c > 0$$ alors $$ac < bc$$</p>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-lg">
                            <p><strong>Multiplication par négatif</strong></p>
                            <p>Si $$a < b$$ et $$c < 0$$ alors $$ac > bc$$</p>
                            <p class="text-sm text-red-600">⚠️ On inverse le sens !</p>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-lg">
                            <p><strong>Inverse</strong></p>
                            <p>Si $$a < b$$ alors $$\\frac{1}{a} > \\frac{1}{b}$$</p>
                        </div>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Encadrement</h3>
                    <p>Si $$a \\le x \\le b$$ et $$c \\le y \\le d$$ alors :</p>
                    <ul class="list-disc pl-6 space-y-1">
                        <li>$$a+c \\le x+y \\le b+d$$</li>
                        <li>$$a-d \\le x-y \\le b-c$$</li>
                        <li>$$ac \\le xy \\le bd$$ (si positifs)</li>
                    </ul>
                `,
                7: `
                    <h3 class="font-semibold text-lg mt-4">🔹 Définitions</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div class="bg-blue-50 p-4 rounded-lg text-center">
                            <p class="font-bold">Cosinus</p>
                            <p>$$\\cos \\hat{a} = \\frac{\\text{adjacent}}{\\text{hypoténuse}}$$</p>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-lg text-center">
                            <p class="font-bold">Sinus</p>
                            <p>$$\\sin \\hat{a} = \\frac{\\text{opposé}}{\\text{hypoténuse}}$$</p>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-lg text-center">
                            <p class="font-bold">Tangente</p>
                            <p>$$\\tan \\hat{a} = \\frac{\\text{opposé}}{\\text{adjacent}}$$</p>
                        </div>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Formules</h3>
                    <div class="bg-green-50 p-4 rounded-lg my-3">
                        <p>$$\\cos^2 a + \\sin^2 a = 1$$</p>
                        <p>$$\\tan a = \\frac{\\sin a}{\\cos a}$$</p>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Angles particuliers</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm border-collapse">
                            <thead><tr class="bg-gray-100"><th class="border p-2">Angle</th><th class="border p-2">0°</th><th class="border p-2">30°</th><th class="border p-2">45°</th><th class="border p-2">60°</th><th class="border p-2">90°</th></tr></thead>
                            <tbody>
                                <tr><td class="border p-2 font-bold">sin</td><td class="border p-2">0</td><td class="border p-2">1/2</td><td class="border p-2">√2/2</td><td class="border p-2">√3/2</td><td class="border p-2">1</td></tr>
                                <tr><td class="border p-2 font-bold">cos</td><td class="border p-2">1</td><td class="border p-2">√3/2</td><td class="border p-2">√2/2</td><td class="border p-2">1/2</td><td class="border p-2">0</td></tr>
                                <tr><td class="border p-2 font-bold">tan</td><td class="border p-2">0</td><td class="border p-2">√3/3</td><td class="border p-2">1</td><td class="border p-2">√3</td><td class="border p-2">—</td></tr>
                            </tbody>
                        </table>
                    </div>
                `,
                8: `
                    <h3 class="font-semibold text-lg mt-4">🔹 Angle au centre</h3>
                    <p>Sommet = centre du cercle.</p>
                    <div class="flex justify-center my-4">
                        <svg width="150" height="150" viewBox="0 0 150 150">
                            <circle cx="75" cy="75" r="60" fill="none" stroke="#1a56db" stroke-width="2"/>
                            <line x1="75" y1="75" x2="75" y2="15" stroke="#dc2626" stroke-width="2"/>
                            <line x1="75" y1="75" x2="130" y2="105" stroke="#dc2626" stroke-width="2"/>
                            <circle cx="75" cy="75" r="4" fill="#1a56db"/>
                            <text x="70" y="70" font-size="12" fill="#1a56db">O</text>
                            <text x="70" y="10" font-size="12" fill="#dc2626">A</text>
                            <text x="135" y="110" font-size="12" fill="#dc2626">B</text>
                        </svg>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Angle inscrit</h3>
                    <p>Sommet sur le cercle.</p>
                    <div class="flex justify-center my-4">
                        <svg width="150" height="150" viewBox="0 0 150 150">
                            <circle cx="75" cy="75" r="60" fill="none" stroke="#1a56db" stroke-width="2"/>
                            <line x1="75" y1="15" x2="25" y2="110" stroke="#dc2626" stroke-width="2"/>
                            <line x1="75" y1="15" x2="130" y2="105" stroke="#dc2626" stroke-width="2"/>
                            <circle cx="75" cy="15" r="4" fill="#dc2626"/>
                            <text x="70" y="10" font-size="12" fill="#dc2626">A</text>
                        </svg>
                    </div>
                    <h3 class="font-semibold text-lg mt-4">🔹 Propriétés</h3>
                    <ul class="list-disc pl-6 space-y-2">
                        <li>Deux angles inscrits interceptant le même arc sont égaux.</li>
                        <li>L'angle au centre vaut le double de l'angle inscrit qui intercepte le même arc.</li>
                    </ul>
                `,
                9: `
                    <h3 class="font-semibold text-lg mt-4">🔹 Triangles isométriques</h3>
                    <p>Deux triangles isométriques sont <strong>superposables</strong>.</p>
                    <div class="bg-blue-50 p-4 rounded-lg my-3">
                        <p><strong>Propriété :</strong> côtés correspondants égaux, angles correspondants égaux.</p>
                    </div>
                    <h4 class="font-semibold mt-3">Cas d'isométrie :</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div class="border p-3 rounded-lg">
                            <p class="font-bold text-sm">1. Côté-Côté-Côté (CCC)</p>
                            <p class="text-sm">Les 3 côtés égaux.</p>
                        </div>
                        <div class="border p-3 rounded-lg">
                            <p class="font-bold text-sm">2. Côté-Angle-Côté (CAC)</p>
                            <p class="text-sm">2 côtés et l'angle compris égaux.</p>
                        </div>
                        <div class="border p-3 rounded-lg">
                            <p class="font-bold text-sm">3. Angle-Côté-Angle (ACA)</p>
                            <p class="text-sm">1 côté adjacent à 2 angles égaux.</p>
                        </div>
                    </div>
                    <h3 class="font-semibold text-lg mt-6">🔹 Triangles semblables</h3>
                    <p>Deux triangles semblables ont leurs angles <strong>deux à deux égaux</strong>.</p>
                    <div class="bg-green-50 p-4 rounded-lg my-3">
                        <p><strong>Propriété :</strong> les côtés correspondants sont <strong>proportionnels</strong>.</p>
                        <p>$$\\frac{AB}{EF} = \\frac{AC}{EG} = \\frac{BC}{FG} = k$$</p>
                    </div>
                    <h4 class="font-semibold mt-3">Cas de similitude :</h4>
                    <ul class="list-disc pl-6 space-y-1">
                        <li><strong>Angle-Angle (AA)</strong> : 2 angles égaux.</li>
                        <li><strong>Côté-Angle-Côté (CAC)</strong> : 1 angle égal entre 2 côtés proportionnels.</li>
                        <li><strong>Côté-Côté-Côté (CCC)</strong> : 3 côtés proportionnels.</li>
                    </ul>
                `
            };
            return contents[moduleId] || '<p>Contenu à venir...</p>';
        }

        // ============================================================
        // EXERCISES - with real-world problems
        // ============================================================
        function renderExercises(module) {
            const moduleId = module.id;
            const state = exerciseStates[moduleId] || {};
            
            const exercises = {
                1: [
                    {
                        id: 'e1_dev',
                        label: 'Développer (x+3)²',
                        hint: 'Utilise (a+b)² = a² + 2ab + b²',
                        check: (val) => val.trim() === 'x²+6x+9' || val.trim() === 'x^2+6x+9',
                        answer: 'x²+6x+9'
                    },
                    {
                        id: 'e1_real',
                        label: '📐 Un terrain rectangulaire a pour longueur L = 2x+5 et largeur l = 2x-5. Exprime son aire sous forme développée.',
                        hint: 'Aire = L × l = (2x+5)(2x-5). Utilise (a+b)(a-b) = a²-b²',
                        check: (val) => val.trim() === '4x²-25' || val.trim() === '4x^2-25',
                        answer: '4x²-25'
                    }
                ],
                9: [
                    {
                        id: 'e9_sim',
                        label: '🔍 Identifier le cas de similitude',
                        hint: 'Deux triangles ont deux angles égaux',
                        type: 'qcm',
                        options: ['Angle-Angle', 'Côté-Angle-Côté', 'Côté-Côté-Côté'],
                        correct: 0,
                        answer: 'Angle-Angle'
                    },
                    {
                        id: 'e9_real',
                        label: '🏗️ Pont en construction : Un ingénieur mesure les longueurs suivantes sur deux triangles formant une structure métallique. AB=6m, BC=8m, AC=10m et DE=9m, EF=12m, DF=15m. Les triangles ABC et DEF sont-ils semblables ? Justifie.',
                        hint: 'Vérifie si les rapports des côtés correspondants sont égaux.',
                        type: 'multiple',
                        check: (val) => {
                            const v = val.trim().toLowerCase();
                            return v.includes('oui') || v.includes('proportionnel') || v.includes('6/9=8/12=10/15');
                        },
                        answer: 'Oui, car 6/9 = 8/12 = 10/15 = 2/3. Les trois côtés sont proportionnels.'
                    }
                ]
            };

            const exList = exercises[moduleId] || [
                { id: 'ex1', label: 'Exercice interactif', hint: 'Résous l\'exercice', check: (v) => v.trim() !== '', answer: 'Bonne réponse' }
            ];

            let html = `
                <div class="space-y-6">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl">${module.icon}</span>
                        <h2 class="text-xl font-bold text-gray-800">Exercices - ${module.title}</h2>
                    </div>
                    <div class="space-y-4">
            `;

            exList.forEach((ex, idx) => {
                const isDone = state[ex.id] === true;
                const feedback = state[ex.id + '_feedback'] || '';
                const isCorrect = state[ex.id + '_correct'] || false;
                
                html += `
                    <div class="border rounded-lg p-5 ${isDone ? (isCorrect ? 'feedback-correct' : 'feedback-wrong') : 'bg-white'} transition-all">
                        <div class="flex items-start gap-3">
                            <span class="text-sm font-bold text-gray-400">#${idx+1}</span>
                            <div class="flex-1">
                                <p class="font-medium text-gray-800">${ex.label}</p>
                                ${ex.hint ? `<p class="text-sm text-gray-500 mt-1">💡 ${ex.hint}</p>` : ''}
                                ${ex.type === 'qcm' ? renderQCM(ex, idx) : renderInput(ex, idx)}
                                ${feedback ? `<div class="mt-3 p-3 rounded-lg ${isCorrect ? 'bg-green-100' : 'bg-yellow-50'} border ${isCorrect ? 'border-green-300' : 'border-yellow-200'}">
                                    <p class="text-sm">${feedback}</p>
                                    ${!isCorrect && ex.answer ? `<p class="text-sm font-medium text-blue-600 mt-1">✅ Réponse attendue : ${ex.answer}</p>` : ''}
                                </div>` : ''}
                                ${isDone ? `<span class="inline-block mt-2 text-sm ${isCorrect ? 'text-green-600' : 'text-red-600'} font-medium">
                                    ${isCorrect ? '✅ Correct !' : '❌ À revoir'}
                                </span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t">
                        <span class="text-sm text-gray-500">${Object.values(state).filter(v => v === true).length} / ${exList.length} exercices résolus</span>
                        <button class="btn-secondary text-sm" onclick="resetModule(${moduleId})">🔄 Réinitialiser</button>
                    </div>
                </div>
            `;
            return html;
        }

        function renderInput(ex, idx) {
            return `
                <div class="flex flex-wrap items-center gap-3 mt-3">
                    <input type="text" class="math-input" id="input_${ex.id}" placeholder="Ta réponse..." 
                           onkeydown="if(event.key==='Enter') checkExercise('${ex.id}')">
                    <button class="btn-primary text-sm" onclick="checkExercise('${ex.id}')">Vérifier</button>
                </div>
            `;
        }

        function renderQCM(ex, idx) {
            return `
                <div class="flex flex-wrap gap-3 mt-3">
                    ${ex.options.map((opt, i) => `
                        <button class="px-4 py-2 rounded-lg border-2 border-gray-200 hover:border-blue-500 transition-colors text-sm qcm-btn"
                                data-ex="${ex.id}" data-idx="${i}" onclick="checkQCM('${ex.id}', ${i})">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        // ============================================================
        // EXERCISE CHECKING LOGIC
        // ============================================================
        window.checkExercise = function(exId) {
            const moduleId = currentModuleId;
            const module = MODULES.find(m => m.id === moduleId);
            const ex = getExerciseById(moduleId, exId);
            if (!ex) return;

            const input = document.getElementById('input_' + exId);
            if (!input) return;
            const val = input.value;
            
            const isCorrect = ex.check(val);
            const state = exerciseStates[moduleId] || {};
            state[exId] = true;
            state[exId + '_correct'] = isCorrect;
            state[exId + '_feedback'] = isCorrect ? '✅ Bravo ! ' + (ex.answer ? 'Réponse : ' + ex.answer : '') : 
                '❌ Pas tout à fait. ' + (ex.hint ? '💡 ' + ex.hint : '');
            exerciseStates[moduleId] = state;
            
            renderContent();
        };

        window.checkQCM = function(exId, idx) {
            const moduleId = currentModuleId;
            const ex = getExerciseById(moduleId, exId);
            if (!ex || ex.type !== 'qcm') return;
            
            const isCorrect = idx === ex.correct;
            const state = exerciseStates[moduleId] || {};
            state[exId] = true;
            state[exId + '_correct'] = isCorrect;
            state[exId + '_feedback'] = isCorrect ? '✅ Exact ! ' + ex.answer : '❌ Réessaye. La bonne réponse est : ' + ex.options[ex.correct];
            exerciseStates[moduleId] = state;
            
            renderContent();
        };

        function getExerciseById(moduleId, exId) {
            const exercises = {
                1: [
                    { id: 'e1_dev', label: 'Développer (x+3)²', hint: 'Utilise (a+b)² = a² + 2ab + b²', check: (v) => v.trim() === 'x²+6x+9' || v.trim() === 'x^2+6x+9', answer: 'x²+6x+9' },
                    { id: 'e1_real', label: '📐 Terrain rectangulaire', hint: 'Aire = (2x+5)(2x-5)', check: (v) => v.trim() === '4x²-25' || v.trim() === '4x^2-25', answer: '4x²-25' }
                ],
                9: [
                    { id: 'e9_sim', label: '🔍 Identifier le cas de similitude', hint: 'Deux triangles ont deux angles égaux', type: 'qcm', options: ['Angle-Angle', 'Côté-Angle-Côté', 'Côté-Côté-Côté'], correct: 0, answer: 'Angle-Angle' },
                    { id: 'e9_real', label: '🏗️ Pont en construction : AB=6m, BC=8m, AC=10m et DE=9m, EF=12m, DF=15m. Sont-ils semblables ?', hint: 'Vérifie les rapports.', type: 'multiple', check: (v) => v.trim().toLowerCase().includes('oui') || v.trim().toLowerCase().includes('proportionnel'), answer: 'Oui, car 6/9=8/12=10/15=2/3' }
                ]
            };
            const list = exercises[moduleId] || [];
            return list.find(e => e.id === exId);
        }

        window.resetModule = function(moduleId) {
            exerciseStates[moduleId] = {};
            renderContent();
        };

        // ============================================================
        // INIT
        // ============================================================
        function renderAll() {
            renderSidebar();
            renderContent();
        }

        // Load KaTeX auto-render
        document.addEventListener('DOMContentLoaded', function() {
            // Load KaTeX auto-render
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js';
            script.onload = function() {
                renderAll();
            };
            document.head.appendChild(script);
            
            // Fallback render if KaTeX fails
            setTimeout(() => {
                if (typeof window.renderMathInElement !== 'function') {
                    renderAll();
                }
            }, 2000);
        });

        // Also handle reset button
        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('Réinitialiser toute la progression ?')) {
                exerciseStates = {};
                renderAll();
            }
        });
    </script>
</body>
</html>
